# =============================================================================
# tmux configuration
# =============================================================================

# --- Terminal & Color Support ------------------------------------------------

# Use tmux-256color for best compatibility; enable true color pass-through
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-256color:Tc"

# Reduce ESC delay so vim mode changes feel instant
set -sg escape-time 10

# Increase scrollback buffer
set -g history-limit 10000

# --- General -----------------------------------------------------------------

set -g mouse on
set -g base-index 1           # windows start at 1
setw -g pane-base-index 1     # panes start at 1
set -g renumber-windows on    # close a window, gaps fill in
set -g focus-events on        # let vim know when focus changes

# --- Status Bar --------------------------------------------------------------
#
# Palette:
#   bg dark   #1c1c1c   (near-black)
#   accent    #5f87af   (steel blue)
#   muted     #626262   (mid-grey)
#   fg light  #d0d0d0   (off-white)

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1c1c1c,fg=#d0d0d0"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#5f87af,fg=#1c1c1c,bold] #S #[bg=#1c1c1c,fg=#5f87af,nobold]"

# Right: time and date
set -g status-right-length 50
set -g status-right "#[fg=#626262] %H:%M  %d %b %Y "

# Inactive windows
set -g window-status-separator ""
set -g window-status-format " #[fg=#626262]#I:#W "

# Active window
set -g window-status-current-format "#[bg=#5f87af,fg=#1c1c1c,bold] #I:#W #[bg=#1c1c1c,fg=#5f87af,nobold]"

# --- Pane Borders ------------------------------------------------------------

set -g pane-border-style        "fg=#3a3a3a"
set -g pane-active-border-style "fg=#5f87af"

# --- Messages & Mode ---------------------------------------------------------

set -g message-style        "bg=#5f87af,fg=#1c1c1c,bold"
set -g message-command-style "bg=#3a3a3a,fg=#d0d0d0"
set -g mode-style           "bg=#5f87af,fg=#1c1c1c"

# --- Key Bindings ------------------------------------------------------------

# Use C-a as prefix (keep C-b as well)
set -g prefix2 C-a
bind C-a send-prefix -2

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with intuitive keys, open in same directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
